<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Compressor | Greedy Algorithm</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Phosphor Icons for modern sleek icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="app-container">
        
        <header class="header">
            <div class="logo">
                <i class="ph ph-file-zip"></i>
                <h1>G-Compress</h1>
            </div>
            <p class="subtitle">Efficient file compression powered by Huffman Coding</p>
        </header>

        <main class="card">
            
            <!-- Upload Section -->
            <section class="upload-section" id="uploadZone">
                <input type="file" id="fileInput" class="file-input" hidden>
                <div class="upload-content">
                    <i class="ph ph-upload-simple upload-icon"></i>
                    <h2>Upload Document</h2>
                    <p>Drag & drop or <span class="browser-btn">browse</span> your files</p>
                    <p class="formats">Supports PDF, TXT, DOCX, etc.</p>
                </div>
            </section>

            <!-- File Details (Hidden by default) -->
            <section class="file-details hidden" id="fileDetails">
                <div class="file-info">
                    <i class="ph ph-file-text format-icon"></i>
                    <div class="file-text">
                        <h3 id="fileName">document.pdf</h3>
                        <p id="fileSize">2.4 MB</p>
                    </div>
                </div>
                <button class="remove-btn" id="removeFile">
                    <i class="ph ph-x"></i>
                </button>
            </section>

            <!-- Options Section (Hidden by default) -->
            <section class="options-section hidden" id="optionsSection">
                <h3>Compression Options</h3>
                
                <div class="tabs">
                    <button class="tab active" data-tab="level">Compression Level</button>
                    <button class="tab" data-tab="range">Target Size Range</button>
                </div>

                <div class="tab-content active" id="levelTab">
                    <label class="radio-card">
                        <input type="radio" name="compressionLevel" value="low">
                        <div class="card-content">
                            <h4>Low Compression</h4>
                            <p>High Quality preserved</p>
                        </div>
                    </label>
                    <label class="radio-card">
                        <input type="radio" name="compressionLevel" value="medium" checked>
                        <div class="card-content">
                            <h4>Medium Compression</h4>
                            <p>Balanced size and quality</p>
                        </div>
                    </label>
                    <label class="radio-card">
                        <input type="radio" name="compressionLevel" value="high">
                        <div class="card-content">
                            <h4>High Compression</h4>
                            <p>Maximum size reduction</p>
                        </div>
                    </label>
                </div>

                <div class="tab-content" id="rangeTab">
                    <div class="range-options">
                        <label class="radio-chip">
                            <input type="radio" name="targetRange" value="0-100" checked>
                            <span>0–100 MB</span>
                        </label>
                        <label class="radio-chip">
                            <input type="radio" name="targetRange" value="100-200">
                            <span>100–200 MB</span>
                        </label>
                        <label class="radio-chip">
                            <input type="radio" name="targetRange" value="200-300">
                            <span>200–300 MB</span>
                        </label>
                    </div>
                    <div class="custom-range mt-3">
                        <label for="customSize">Custom Target Size (MB)</label>
                        <input type="number" id="customSize" placeholder="E.g. 50" min="1" class="text-input">
                    </div>
                </div>
            </section>

            <!-- Action Section -->
            <div class="action-section hidden" id="actionSection">
                <button id="compressBtn" class="primary-btn">
                    <span class="btn-text">Compress File</span>
                    <i class="ph ph-arrows-in-line-horizontal btn-icon"></i>
                    <div class="loader hidden"></div>
                </button>
            </div>

            <!-- Output Section (Hidden by default) -->
            <section class="output-section hidden" id="outputSection">
                <div class="success-alert">
                    <i class="ph ph-check-circle"></i>
                    <span>Compression Complete!</span>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-box">
                        <span class="stat-label">Original Size</span>
                        <span class="stat-value" id="outOriginal">0 MB</span>
                    </div>
                    <div class="stat-box highlight">
                        <span class="stat-label">Compressed Size</span>
                        <span class="stat-value" id="outCompressed">0 MB</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">Space Saved</span>
                        <span class="stat-value text-green" id="outRatio">0%</span>
                    </div>
                </div>

                <a href="#" id="downloadBtn" class="primary-btn download">
                    <span class="btn-text">Download Compressed File</span>
                    <i class="ph ph-download-simple btn-icon"></i>
                </a>
            </section>

        </main>
        
        <!-- Footer removed as per user request -->
    </div>
    
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
